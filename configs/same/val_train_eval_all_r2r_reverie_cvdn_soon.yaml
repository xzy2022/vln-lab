experiment:
  id: "val-train-eval-all-r2r-reverie-cvdn-soon"
  # Evaluate train files through eval-mode split aliases (`train_eval`) so the
  # produced traces are deterministic and compatible with held-out validation.
  test: false
  eval_first: true
  eval_only: true
  decision_trace: true
  moe_trace: true
  max_saved_ckpts: 0
  save_latest_states: false
  data_dir: "../../../data/same"
  resume_file: "../../../data/same/ckpt/SAME.pt"

training:
  iters: 0
  num_iters_per_epoch: 1
  batch_size: 8
  val_batch_size: 4
  workers: 2

model:
  moe_position: "Attn_q"
  pretrained_ckpt: "../../../data/same/pretrain/Attnq_pretrained_ckpt.pt"
  task_routing_feature: "multi"

simulator:
  connectivity_dir:
    "mattersim": "../../../data/same/simulator/connectivity/"
  candidate_file_dir:
    "mattersim": "../../../data/same/simulator/mp3d_scanvp_candidates.json"
  node_location_dir:
    "mattersim": "../../../data/same/simulator/mp3d_connectivity_graphs.json"

task:
  source: ["R2R", "REVERIE", "CVDN", "SOON"]
  val_source: ["R2R", "REVERIE", "CVDN", "SOON"]
  test_source: ["R2R", "REVERIE", "CVDN", "SOON"]
  train_simulation_env:
    "R2R": "mattersim"
    "REVERIE": "mattersim"
    "CVDN": "mattersim"
    "SOON": "mattersim"
  eval_simulation_env:
    "R2R": "mattersim"
    "REVERIE": "mattersim"
    "CVDN": "mattersim"
    "SOON": "mattersim"
  eval_splits:
    "R2R": ["train_eval", "val_train_seen", "val_seen", "val_unseen"]
    "REVERIE": ["train_eval", "val_train_seen", "val_seen", "val_unseen"]
    "CVDN": ["train_eval", "val_seen", "val_unseen"]
    "SOON": ["train_eval", "val_seen", "val_unseen"]

dataset:
  R2R:
    SPLIT:
      "train_eval": "R2R_train_mergesim_enc.json"
  REVERIE:
    SPLIT:
      "train_eval": "REVERIE_train_enc.json"
  CVDN:
    SPLIT:
      "train_eval": "train.json"
  SOON:
    SPLIT:
      "train_eval": "train_enc_pseudo_obj_ade30k_label.jsonl"
