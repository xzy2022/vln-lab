# configs/global/lab/paths.yaml
project_root: /workspace/vln-lab

mounts:
  models:
    host: /data/shared/models
    container: /workspace/vln-lab/external/models
    mode: ro

  datasets:
    host: /data/xieziyang/data
    container: /workspace/vln-lab/data
    mode: ro

  wheels:
    host: /data/shared/wheels
    container: /workspace/vln-lab/external/wheels
    mode: ro

  hf_cache:
    host: /data/xieziyang/hf_cache
    container: /workspace/vln-lab/external/hf-cache
    mode: rw

  experiment_outputs:
    host: /data/xieziyang/experiment_outputs
    container: /workspace/vln-lab/experiment_outputs
    mode: rw
